name: Build & Deploy to one.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          TINA_CLIENT_ID: ${{ secrets.id }}
          TINA_TOKEN: ${{ secrets.token }}
          GITHUB_REF_NAME: main

      - name: Deploy to one.com via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.sweafs.se
          username: ${{ secrets.name }}
          password: ${{ secrets.password }}
          local-dir: ./dist/
          server-dir: /www/
          dangerous-clean-slate: false
