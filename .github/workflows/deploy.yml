name: Build & Deploy to one.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_SITE_CONTENT_KEY: main

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to one.com via FTP
        env:
          FTP_PASS: ${{ secrets.pass1 }}
        run: |
          lftp -e "set ssl:verify-certificate false; mirror -R --delete --verbose dist/ /www/; quit" \
               -u efe.gencer@icloud.com,$FTP_PASS \
               ftp.sweafs.se
